name: Build CI

on:
  push:
    branches: [ "master" ]
    paths: &paths
      - "meson.build"
      - "meson.options"
      - "meson_options.txt"
      - "src/**"
      - "man/**"
      - "completion/**"
      - "vim/**"
      - ".github/**"

  pull_request:
    branches: [ "master" ]
    paths: *paths

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env:
          - name: glibc
            container: ""
            install: |
              sudo apt-get update
              sudo apt-get install -y \
                meson ninja-build pkg-config g++ \
                libarchive-dev libacl1-dev attr scdoc
          - name: musl
            container: "alpine:latest"
            install: |
              apk add --no-cache \
                build-base meson ninja pkgconf \
                libarchive-dev acl-dev attr-dev scdoc \
                libarchive-static acl-static attr-static \
                zlib-static zstd-static xz-static bzip2-static lz4-static expat-static

        cfg:
          - name: shared
            link_mode: shared
          - name: static
            link_mode: static

#       exclude:
#         - env:
#             name: musl
#             container: "alpine:latest"
#             install: |
#               apk add --no-cache \
#                 build-base meson ninja pkgconf \
#                 libarchive-dev acl-dev attr-dev scdoc
#           cfg:
#             name: static
#             link_mode: static

    name: ${{ matrix.env.name }} / ${{ matrix.cfg.name }}
    container: ${{ matrix.env.container != '' && matrix.env.container || null }}

    steps:
      - uses: actions/checkout@v4

      - name: Checkout libpkgcore
        uses: actions/checkout@v4
        with:
          repository: zeppe-lin/libpkgcore
          path: libpkgcore

      - name: Checkout libpkgaudit
        uses: actions/checkout@v4
        with:
          repository: zeppe-lin/libpkgaudit
          path: libpkgaudit

      - name: Install build dependencies
        run: ${{ matrix.env.install }}

      - name: Set dependency prefix
        run: |
          echo "DEPS_PREFIX=${{ github.workspace }}/prefix/usr" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=${{ github.workspace }}/prefix/usr/lib/pkgconfig" >> $GITHUB_ENV

      - name: Configure libpkgcore
        run: |
          meson setup build-libpkgcore libpkgcore \
            --buildtype=plain \
            --wrap-mode=nodownload \
            --prefix=/usr \
            -Db_lto=false \
            -Db_pie=true \
            -Dextract_acl=false \
            -Dextract_xattr=true

      - name: Build libpkgcore
        run: meson compile -C build-libpkgcore -v

      - name: Install libpkgcore into private prefix
        run: |
          DESTDIR="${{ github.workspace }}/prefix" meson install -C build-libpkgcore
          find "${{ github.workspace }}/" -path '*/pkgconfig/*.pc' -print
          pkg-config --debug --modversion libpkgcore

      - name: Configure libpkgaudit
        run: |
          meson setup build-libpkgaudit libpkgaudit \
            --buildtype=plain \
            --wrap-mode=nodownload \
            --prefix=/usr \
            -D b_lto=false \
            -D b_pie=true

      - name: Build libpkgaudit
        run: meson compile -C build-libpkgaudit -v

      - name: Install libpkgaudit into private prefix
        run: |
          DESTDIR="${{ github.workspace }}/prefix" meson install -C build-libpkgaudit

      - name: Inspect uninstalled pkg-config metadata
        run: |
          find "${{ github.workspace }}/prefix" -name '*.pc' -print
          pkg-config --variable pc_path pkg-config || true
          pkg-config --modversion libpkgcore libpkgaudit

      - name: Configure pkgutils
        run: |
          meson setup build \
            --buildtype=plain \
            --wrap-mode=nodownload \
            --prefix=/usr \
            -Db_lto=false \
            -Db_pie=true \
            -Dlink_mode=${{ matrix.cfg.link_mode }}

      - name: Build pkgutils
        run: meson compile -C build -v

      - name: Install pkgutils to staging
        run: |
          DESTDIR="$PWD/stage" meson install -C build
