name: Build CI

on:
  push:
    branches: [ "master" ]
    paths: &paths
      - "meson.build"
      - "meson.options"
      - "meson_options.txt"
      - "src/**"
      - "man/**"
      - "completion/**"
      - "vim/**"
      - ".github/**"

  pull_request:
    branches: [ "master" ]
    paths: *paths

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env:
          - name: glibc
            container: ""
            install: |
              sudo apt-get update
              sudo apt-get install -y \
                meson ninja-build pkg-config g++ \
                libarchive-dev libacl1-dev attr scdoc
          - name: musl
            container: "alpine:latest"
            install: |
              apk add --no-cache \
                build-base meson ninja pkgconf \
                libarchive-dev acl-dev attr-dev scdoc

        cfg:
          - name: shared
            link_mode: shared
          - name: static
            link_mode: static

        exclude:
          - env:
              name: musl
              container: "alpine:latest"
              install: |
                apk add --no-cache \
                  build-base meson ninja pkgconf \
                  libarchive-dev acl-dev attr-dev scdoc
            cfg:
              name: static
              link_mode: static

    name: ${{ matrix.env.name }} / ${{ matrix.cfg.name }}
    container: ${{ matrix.env.container != '' && matrix.env.container || null }}

    steps:
      - uses: actions/checkout@v4

      - name: Checkout libpkgcore
        uses: actions/checkout@v4
        with:
          repository: zeppe-lin/libpkgcore
          path: libpkgcore

      - name: Install build dependencies
        run: ${{ matrix.env.install }}

      - name: Configure libpkgcore
        run: |
          meson setup build-libpkgcore libpkgcore \
            --buildtype=plain \
            --wrap-mode=nodownload \
            --prefix=/usr \
            -Db_lto=false \
            -Db_pie=true \
            -Dextract_acl=false \
            -Dextract_xattr=true

      - name: Build libpkgcore
        run: meson compile -C build-libpkgcore -v

      # For debug
      #- name: Inspect uninstalled pkg-config metadata
      #  run: |
      #    ls -la build-libpkgcore/meson-uninstalled || true
      #    find build-libpkgcore -maxdepth 2 -name '*.pc' -print

      - name: Configure pkgutils
        env:
          PKG_CONFIG_PATH: ${{ github.workspace }}/build-libpkgcore/meson-uninstalled
        run: |
          pkg-config --modversion libpkgcore
          meson setup build \
            --buildtype=plain \
            --wrap-mode=nodownload \
            --prefix=/usr \
            -Db_lto=false \
            -Db_pie=true \
            -Dlink_mode=${{ matrix.cfg.link_mode }}

      - name: Build pkgutils
        env:
          PKG_CONFIG_PATH: ${{ github.workspace }}/build-libpkgcore/meson-uninstalled
        run: meson compile -C build -v

      - name: Install pkgutils to staging
        env:
          PKG_CONFIG_PATH: ${{ github.workspace }}/build-libpkgcore/meson-uninstalled
        run: |
          DESTDIR="$PWD/stage" meson install -C build
